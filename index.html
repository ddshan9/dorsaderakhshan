  <style>
    /* Body and general styling */
    body {
      margin: 0;
      font-family: 'Athelas', serif; /* updated font */
      background: #f5f2eb; /* birch tone */
      color: #222;
    }

    /* Navigation bar */
    nav {
      position: fixed;
      top: 0;
      right: 0;
      padding: 20px 40px;
      display: flex;
      gap: 30px;
      z-index: 10;
    }

    nav a {
      text-decoration: none;
      color: #222;
      font-weight: 400;
      letter-spacing: 1px;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* Centered name */
    .title {
      height: 100vh;               /* full screen */
      display: flex;
      align-items: center;         /* vertical center */
      justify-content: center;     /* horizontal center */
      font-size: 3rem;             /* large name */
      font-weight: 400;            /* normal weight for serif */
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Collection</a>
