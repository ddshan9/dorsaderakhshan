<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dorsa</title>
  <link href="https://fonts.googleapis.com/css2?family=Athelas&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Athelas', serif;
      background: #f5f2eb;
      color: #222;
    }

    /* Navigation bar */
    nav {
      position: fixed;
      top: 0;
      right: 0;
      padding: 20px 40px;
      display: flex;
      gap: 30px;
      z-index: 10;
    }

    nav a {
      text-decoration: none;
      color: #222;
      font-weight: 400;
      letter-spacing: 1px;
      font-size: 1rem;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* Centered title, slightly higher than middle */
    .title {
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-size: 5rem;
      font-weight: 400;
      letter-spacing: 2px;
      padding-top: 20vh;
    }

    /* Responsive scaling */
    @media (max-width: 768px) {
      .title {
        font-size: 3rem;
        padding-top: 15vh;
      }
      nav a {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Collection</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<div class="title">Dorsa</div>

</body>
</html>
