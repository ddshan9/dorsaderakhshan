<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dorsa</title>
  <link href="https://fonts.googleapis.com/css2?family=Athelas&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Athelas', serif;
      background: #f5f2eb; /* birch tone */
      color: #222;
    }

    /* Header container: name + nav */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: #f5f2eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* Name on the left */
    .name {
      font-size: 2rem;   /* slightly smaller font */
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* Navigation on the right */
    nav a {
      text-decoration: none;
      color: #222;
      font-weight: 400;
      letter-spacing: 1px;
      margin-left: 25px;
      font-size: 0.95rem;  /* slightly smaller nav font */
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* Optional hero section below header */
    .hero {
      height: calc(100vh - 70px); /* remaining screen height */
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5rem;  /* slightly smaller hero text */
      font-weight: 300;
      letter-spacing: 2px;
    }

    /* Responsive scaling */
    @media (max-width: 768px) {
      .name {
        font-size: 1.5rem;
      }
      nav a {
        font-size: 0.85rem;
        margin-left: 15px;
      }
      .hero {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="name">Dorsa</div>
  <nav>
    <a href="index.html">Collection</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- Optional hero section below -->
<div class="hero">Welcome to my portfolio</div>

</body>
</html>
