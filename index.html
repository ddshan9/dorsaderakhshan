<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dorsa</title>
  <link href="https://fonts.googleapis.com/css2?family=Athelas&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Athelas', serif;
      background: #f5f2eb; /* birch tone */
      color: #222;
    }

    /* Header container: name + nav */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;  /* aligns name and nav vertically */
      padding: 15px 50px;
      background: #f5f2eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* Name on center */
    .name {
      font-size: 1.5rem;   /* smaller, subtle size */
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* Navigation on the right */
    nav a {
      text-decoration: none;
      color: #222;
      font-weight: 400;
      letter-spacing: 1px;
      margin-left: 25px;
      font-size: 1rem;  /* default nav font size */
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* Responsive scaling */
    @media (max-width: 768px) {
      .name {
        font-size: 1.2rem;
      }
      nav a {
        font-size: 0.9rem;
        margin-left: 15px;
      }
      .hero {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="name">Dorsa</div>
  <nav>
    <a href="index.html">Collection</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

</body>
</html>
