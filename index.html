<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dorsa</title>
  <link href="https://fonts.googleapis.com/css2?family=Athelas&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Athelas', serif;
      background: #f5f2eb; /* birch tone */
      color: #222;
    }

    /* Header container: centered title + right nav */
    header {
      display: flex;
      justify-content: center; /* center title */
      align-items: center;     /* vertically center */
      padding: 15px 50px;
      position: relative;      /* for nav positioning */
      background: #f5f2eb;
      height: 60px;
      z-index: 10;
    }

    /* Title centered in header */
    .name {
      font-size: 2rem;      /* elegant size */
      font-weight: 400;
      letter-spacing: 1px;
      text-align: center;
      position: absolute;      /* allows nav to float right */
      left: 50%;
      transform: translateX(-50%);
    }

    /* Navigation on the right */
    nav {
      position: absolute;
      right: 50px;
      display: flex;
      gap: 25px;
    }

    nav a {
      text-decoration: none;
      color: #222;
      font-weight: 400;
      letter-spacing: 1px;
      font-size: 1rem;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* Responsive scaling */
    @media (max-width: 768px) {
      .name {
        font-size: 1.2rem;
      }
      nav a {
        font-size: 0.9rem;
        gap: 15px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="name">Dorsa</div>
  <nav>
    <a href="index.html">Collection</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

</body>
</html>
